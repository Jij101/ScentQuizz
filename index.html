<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ScentQuiz | Find Your Signature Fragrance</title>
  <meta name="description"
    content="Discover your olfactory profile among more than 150 masterpieces of global haute parfumerie." />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Inter:wght@300;400;500;600&display=swap"
    rel="stylesheet">

  <link rel="stylesheet" href="style.css" />

  <style>
    .lang-switch {
      position: absolute;
      top: 15px;
      right: 20px;
      font-size: 14px;
      cursor: pointer;
      z-index: 1000;
    }

    .lang-switch span {
      padding: 4px 8px;
    }

    .lang-switch span.active {
      font-weight: 600;
      text-decoration: underline;
    }
  </style>
</head>

<body class="editorial-theme">

  <!-- HEADER -->
  <header class="luxury-header">
    <div class="header-left">
      <span class="header-link">The Experience</span>
    </div>
    <div class="header-center">
      <span class="logo-mark">ScentQuiz</span>
    </div>
    <div class="header-right">
      <a href="#quiz-wrapper" class="header-link quiz-trigger">The Diagnostic</a>
    </div>

    <!-- Langue Switch -->
    <div class="lang-switch">
      <span onclick="toggleLanguage('en')" id="lang-en" class="active">EN</span> |
      <span onclick="toggleLanguage('fr')" id="lang-fr">FR</span>
    </div>
  </header>

  <!-- HERO + AUTRES SECTIONS -->
  <main id="main-content">
    <!-- Ton contenu actuel (hero, statement, etc.) -->
    <!-- ... garde tout ton contenu ici ... -->
  </main>

  <!-- QUIZ OVERLAY -->
  <div class="quiz-overlay" id="quiz-wrapper">
    <div class="quiz-overlay-bg"></div>
    <div class="quiz-close">✕</div>

    <div class="quiz-content-container" id="quiz-container">
      <!-- Intro, Questions, Results injectés par JS -->
    </div>
  </div>

  <!-- DATABASE FILES -->
  <script src="database_part1.js"></script>
  <script src="database_part2.js"></script>
  <script src="database_part3.js"></script>
  <script src="database.js"></script>

  <!-- QUIZ LOGIC -->
  <script src="quiz.js"></script>

  <script>
    let currentLang = 'en';

    function toggleLanguage(lang) {
      if (lang === currentLang) return;

      currentLang = lang;

      // Mise à jour visuelle du bouton actif
      document.getElementById('lang-en').classList.toggle('active', lang === 'en');
      document.getElementById('lang-fr').classList.toggle('active', lang === 'fr');

      // Appel à la fonction de traduction (à développer plus tard)
      console.log('Langue changée vers :', lang);
      // Ici tu pourras appeler ta fonction de traduction complète
    }
  </script>
</body>

</html>
